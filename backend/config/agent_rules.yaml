# ========== 路由分组 ==========
# 快速通道意图：直接模板回复，完全跳过 LLM
fast_track_intents:
  - greeting
  - thanks
  - farewell
  - capability

# 产品相关意图：走预搜索 + ReAct 快速模式
product_intents:
  - product_inquiry
  - price_inquiry
  - spec_inquiry
  - recommendation
  - purchase_intent

# ========== 模板回复 ==========
templates:
  greeting: "您好，欢迎咨询保军礼品。您可以告诉我想了解的礼品类型、预算、数量或用途。"
  thanks: "不客气！如有其他问题随时咨询我~"
  farewell: "再见，期待再次为您服务！"
  capability: "我可以帮您查询保军礼品的产品信息、价格、规格，也可以根据您的需求推荐合适的礼品方案。请告诉我您想了解什么吧！"
  purchase_intent: "可以的，请告诉我您想采购的礼品类型、预算范围和数量，我来帮您推荐合适产品。"
  price_inquiry: "请告诉我具体想咨询的产品名称、分类或预算区间，我来帮您查询价格信息。"
  default: "我已经收到您的需求。请告诉我更具体的产品关键词、预算、数量或使用场景，我会继续为您筛选合适方案。"

# ========== 加载阶段提示语 ==========
# 按顺序展示，orchestrator 在每个阶段通过 socket 推送给前端
loading_hints:
  analyzing: "正在分析您的问题..."
  searching: "正在为您搜索相关产品..."
  generating: "正在为您整理回复内容..."
